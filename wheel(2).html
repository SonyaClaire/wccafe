<style>
/* ── COSMIC WHISPERS · shared.css ── */
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@300;400;500;600&display=swap');

:root {
  --ink:#08030f; --deep:#0f0620; --void:#160b2a; --veil:#1e1038;
  --mist:#271448; --dust:#8b6bb1; --silver:#c4a8e8; --moon:#e8daf5;
  --star:#f5f0ff; --gold:#d4a843; --ember:#c4621a; --rose:#c4507a;
  --teal:#3dbcb8; --sage:#7ab87a; --red:#e06060; --blue:#6080e8;
  --r:16px; --glow:0 0 30px rgba(196,168,232,.15);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--moon);font-family:'Crimson Pro',Georgia,serif;
  font-size:17px;min-height:100vh;overflow-x:hidden;padding-bottom:80px}

/* STARFIELD */
#starfield{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse at 25% 20%,#1a0f3a 0%,#08030f 65%)}
.star{position:absolute;background:#fff;border-radius:50%;
  animation:twinkle var(--dur,3s) var(--delay,0s) infinite ease-in-out}
@keyframes twinkle{0%,100%{opacity:var(--lo,.2);transform:scale(1)}50%{opacity:var(--hi,.9);transform:scale(1.4)}}
.nebula{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;
  animation:drift 22s ease-in-out infinite alternate}
.nb1{width:420px;height:320px;background:rgba(100,40,180,.1);top:-60px;right:-100px}
.nb2{width:360px;height:360px;background:rgba(40,80,200,.07);bottom:80px;left:-80px;animation-delay:-11s}
.nb3{width:280px;height:220px;background:rgba(180,50,120,.06);top:45%;right:15%;animation-delay:-5s}
@keyframes drift{0%{transform:translate(0,0) rotate(0deg)}100%{transform:translate(25px,18px) rotate(12deg)}}

/* LAYOUT */
#app{position:relative;z-index:1;min-height:100vh;max-width:640px;margin:0 auto}

/* HUD BAR */
#hud{position:sticky;top:0;z-index:100;display:flex;align-items:center;
  background:rgba(8,3,15,.88);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(196,168,232,.1);
  padding:8px 4px;gap:2px;overflow-x:auto;scrollbar-width:none}
#hud::-webkit-scrollbar{display:none}
.hud-item{flex:1;min-width:52px;text-align:center;padding:4px 2px}
.hud-label{font-family:'Raleway',sans-serif;font-size:9px;color:var(--dust);
  letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.hud-val{font-family:'Raleway',sans-serif;font-size:11px;color:var(--moon);font-weight:500;white-space:nowrap}
.sun-val{color:var(--gold)}
.retro-val{color:var(--rose)}

/* NAV */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(8,3,15,.95);backdrop-filter:blur(20px);
  border-top:1px solid rgba(196,168,232,.1);
  display:flex;align-items:center;justify-content:space-around;
  padding:6px 0 max(6px,env(safe-area-inset-bottom))}
.nav-btn{background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:5px 8px;border-radius:10px;color:var(--dust);
  font-family:'Raleway',sans-serif;font-size:9px;letter-spacing:.5px;
  min-width:42px;transition:color .2s;text-decoration:none}
.nav-btn.active{color:var(--silver)}
.nav-btn.active .ni{filter:drop-shadow(0 0 5px rgba(196,168,232,.5))}
.ni{font-size:18px;transition:transform .2s;display:block}
.nav-btn:active .ni{transform:scale(.85)}

/* CARDS */
.card{background:rgba(22,11,42,.72);border:1px solid rgba(196,168,232,.1);
  border-radius:var(--r);padding:18px;margin-bottom:14px;
  backdrop-filter:blur(10px);box-shadow:var(--glow)}
.card-title{font-family:'Cinzel Decorative',serif;font-size:11px;letter-spacing:3px;
  color:var(--dust);text-transform:uppercase;margin-bottom:14px;
  display:flex;align-items:center;gap:8px}
.card-title::after{content:'';flex:1;height:1px;
  background:linear-gradient(to right,rgba(196,168,232,.2),transparent)}

/* PAGE HEADER */
.page-wrap{padding:16px}
.page-title{font-family:'Cinzel Decorative',serif;font-size:20px;
  color:var(--silver);text-align:center;margin-bottom:4px;
  text-shadow:0 0 30px rgba(196,168,232,.4)}
.page-sub{font-size:13px;color:var(--dust);text-align:center;
  font-style:italic;margin-bottom:20px}

/* BUTTONS */
.btn{border:none;border-radius:12px;cursor:pointer;
  font-family:'Raleway',sans-serif;letter-spacing:1.5px;
  text-transform:uppercase;transition:all .2s;width:100%;padding:12px}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,rgba(100,50,180,.45),rgba(60,80,200,.35));
  border:1px solid rgba(196,168,232,.25);color:var(--moon);font-size:13px}
.btn-teal{background:rgba(61,188,184,.15);border:1px solid rgba(61,188,184,.3);
  color:var(--teal);font-size:12px;margin-top:10px}
.btn-gold{background:rgba(212,168,67,.15);border:1px solid rgba(212,168,67,.3);
  color:var(--gold);font-size:12px;margin-top:10px}

/* INPUTS */
.field-label{font-family:'Raleway',sans-serif;font-size:11px;color:var(--dust);
  letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:block}
.field-input{width:100%;background:rgba(30,16,56,.8);
  border:1px solid rgba(196,168,232,.15);border-radius:10px;
  color:var(--moon);font-family:'Crimson Pro',serif;font-size:16px;
  padding:10px 14px;outline:none;transition:border-color .2s}
.field-input:focus{border-color:rgba(196,168,232,.4)}
textarea.field-input{min-height:110px;resize:vertical}
.field-group{margin-bottom:12px}

/* TAGS */
.tag{background:rgba(196,168,232,.1);border:1px solid rgba(196,168,232,.15);
  border-radius:20px;padding:4px 12px;
  font-family:'Raleway',sans-serif;font-size:12px;color:var(--silver);display:inline-block}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}

/* TOGGLE */
.toggle-row{display:flex;background:rgba(30,16,56,.7);
  border:1px solid rgba(196,168,232,.1);border-radius:10px;
  overflow:hidden;margin-bottom:16px}
.toggle-btn{flex:1;background:none;border:none;cursor:pointer;
  padding:9px 6px;font-family:'Raleway',sans-serif;font-size:11px;
  color:var(--dust);transition:all .2s;letter-spacing:.5px}
.toggle-btn.active{background:rgba(196,168,232,.14);color:var(--silver)}

/* MODAL */
#modal-overlay{display:none;position:fixed;inset:0;z-index:200;
  background:rgba(4,1,10,.88);backdrop-filter:blur(8px);
  align-items:flex-end;justify-content:center}
#modal-overlay.open{display:flex;animation:fadeIn .2s ease}
#modal-box{background:var(--void);border:1px solid rgba(196,168,232,.15);
  border-radius:24px 24px 0 0;padding:24px 20px max(24px,env(safe-area-inset-bottom));
  width:100%;max-width:640px;max-height:88vh;overflow-y:auto;
  animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-close{float:right;background:rgba(196,168,232,.1);border:none;
  color:var(--dust);font-size:18px;border-radius:50%;
  width:30px;height:30px;cursor:pointer;line-height:30px;text-align:center}
.modal-title{font-family:'Cinzel Decorative',serif;font-size:16px;color:var(--silver);margin-bottom:3px}
.modal-sub{font-size:13px;color:var(--dust);margin-bottom:18px}
.modal-section{margin-bottom:14px}
.modal-section h4{font-family:'Raleway',sans-serif;font-size:10px;
  letter-spacing:2px;color:var(--dust);text-transform:uppercase;margin-bottom:5px}

/* RESULT ROWS */
.result-row{display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid rgba(196,168,232,.06)}
.result-label{color:var(--dust);font-size:14px}
.result-val{color:var(--moon);font-size:14px;text-align:right;max-width:60%}

/* DIVIDER */
.divider{height:1px;background:linear-gradient(to right,transparent,rgba(196,168,232,.15),transparent);margin:14px 0}

/* TOAST */
#toast{position:fixed;bottom:95px;left:50%;transform:translateX(-50%) translateY(16px);
  background:rgba(61,188,184,.92);color:#fff;border-radius:20px;
  padding:10px 24px;font-family:'Raleway',sans-serif;font-size:13px;
  z-index:300;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;
  padding:3px 10px;font-family:'Raleway',sans-serif;font-size:10px;letter-spacing:.5px}
.badge-retro{background:rgba(196,100,80,.15);border:1px solid rgba(196,100,80,.3);color:var(--ember)}
.badge-teal{background:rgba(61,188,184,.12);border:1px solid rgba(61,188,184,.25);color:var(--teal)}
.badge-gold{background:rgba(212,168,67,.12);border:1px solid rgba(212,168,67,.25);color:var(--gold)}
.badge-green{background:rgba(122,184,122,.12);border:1px solid rgba(122,184,122,.25);color:var(--sage)}

/* LOADING */
.loading{color:var(--dust);font-style:italic;text-align:center;padding:24px;font-size:15px}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(196,168,232,.2);border-radius:2px}

</style>

function initStarfield() {

const SIGNS=[{name:'Aries',glyph:'♈'},{name:'Taurus',glyph:'♉'},{name:'Gemini',glyph:'♊'},{name:'Cancer',glyph:'♋'},{name:'Leo',glyph:'♌'},{name:'Virgo',glyph:'♍'},{name:'Libra',glyph:'♎'},{name:'Scorpio',glyph:'♏'},{name:'Sagittarius',glyph:'♐'},{name:'Capricorn',glyph:'♑'},{name:'Aquarius',glyph:'♒'},{name:'Pisces',glyph:'♓'}];

function lonToSign(lon){const n=((lon%360)+360)%360,i=Math.floor(n/30);return{...SIGNS[i],deg:(n-i*30).toFixed(1),idx:i};}

// Safe astronomy wrappers - never crash, always return something
function getSunLon(d){
  try{ if(typeof Astronomy==='undefined') return estimateSunLon(d); return Astronomy.SunPosition(d).elon; }
  catch(e){ return estimateSunLon(d); }
}
function estimateSunLon(d) {
  // Rough Sun longitude estimate based on day of year
  const start = new Date(d.getFullYear(), 0, 0);
  const diff = d - start;
  const dayOfYear = Math.floor(diff / 86400000);
  return ((dayOfYear - 80) / 365.25) * 360;
}
function getMoonLon(d){
  try{
    if(typeof Astronomy==='undefined') return estimateMoonLon(d);
    const eq=Astronomy.Equator('Moon',d,null,false,true),ec=Astronomy.Ecliptic(eq.vec);
    return((ec.elon%360)+360)%360;
  }catch(e){ return estimateMoonLon(d); }
}
function estimateMoonLon(d) {
  // Rough Moon longitude estimate
  const knownNew = new Date('2024-01-11').getTime();
  const synodicMs = 29.53059 * 86400000;
  const elapsed = d.getTime() - knownNew;
  const phase = ((elapsed % synodicMs) + synodicMs) % synodicMs;
  return (phase / synodicMs) * 360;
}
function getPlanetLon(body,d){
  try{
    if(typeof Astronomy==='undefined') return null;
    const eq=Astronomy.Equator(body,d,null,false,true),ec=Astronomy.Ecliptic(eq.vec);
    return((ec.elon%360)+360)%360;
  }catch(e){ return null; }
}
function isRetro(body,date){
  if(body==='Sun'||body==='Moon')return false;
  try{
    if(typeof Astronomy==='undefined') return false;
    const l1=getPlanetLon(body,new Date(date-86400000)),l2=getPlanetLon(body,new Date(date+86400000));
    if(l1===null||l2===null)return false;
    let d=l2-l1;if(d>180)d-=360;if(d<-180)d+=360;return d<0;
  }catch(e){return false;}
}
function getMoonPhase(d){
  try{
    if(typeof Astronomy==='undefined') return estimateMoonPhase(d);
    const a=Astronomy.MoonPhase(d),il=Math.round((1-Math.cos(a*Math.PI/180))/2*100);
    const p=[[22.5,'New Moon','🌑'],[67.5,'Waxing Crescent','🌒'],[112.5,'First Quarter','🌓'],[157.5,'Waxing Gibbous','🌔'],[202.5,'Full Moon','🌕'],[247.5,'Waning Gibbous','🌖'],[292.5,'Last Quarter','🌗'],[337.5,'Waning Crescent','🌘']];
    for(const[t,n,i]of p)if(a<t)return{name:n,icon:i,illum:il,angle:a};
    return{name:'New Moon',icon:'🌑',illum:il,angle:a};
  }catch(e){ return estimateMoonPhase(d); }
}
function estimateMoonPhase(d) {
  const lon = estimateMoonLon(d);
  const sunLon = estimateSunLon(d);
  const angle = ((lon - sunLon) + 360) % 360;
  const il = Math.round((1-Math.cos(angle*Math.PI/180))/2*100);
  const p=[[22.5,'New Moon','🌑'],[67.5,'Waxing Crescent','🌒'],[112.5,'First Quarter','🌓'],[157.5,'Waxing Gibbous','🌔'],[202.5,'Full Moon','🌕'],[247.5,'Waning Gibbous','🌖'],[292.5,'Last Quarter','🌗'],[337.5,'Waning Crescent','🌘']];
  for(const[t,n,i]of p)if(angle<t)return{name:n,icon:i,illum:il,angle};
  return{name:'New Moon',icon:'🌑',illum:il,angle};
}

// Sun/Moon rise/set with fallback
function getSunTimes(date, lat, lon) {
  try {
    if(typeof Astronomy==='undefined'||!lat||!lon) return {rise:'6:30 AM',set:'6:30 PM',daylight:'12.0h'};
    const obs=new Astronomy.Observer(lat,lon,0);
    const fmt=d=>d?new Date(d.date).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'—';
    const sr=Astronomy.SearchRiseSet('Sun',obs,+1,date,1);
    const ss=Astronomy.SearchRiseSet('Sun',obs,-1,date,1);
    const hrs=sr&&ss?((new Date(ss.date)-new Date(sr.date))/3600000).toFixed(1)+'h':'12h';
    return{rise:fmt(sr),set:fmt(ss),daylight:hrs};
  }catch(e){return{rise:'6:30 AM',set:'6:30 PM',daylight:'12.0h'};}
}
function getMoonTimes(date, lat, lon) {
  try {
    if(typeof Astronomy==='undefined'||!lat||!lon) return {rise:'—',set:'—'};
    const obs=new Astronomy.Observer(lat,lon,0);
    const fmt=d=>d?new Date(d.date).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'—';
    return{rise:fmt(Astronomy.SearchRiseSet('Moon',obs,+1,date,1)),set:fmt(Astronomy.SearchRiseSet('Moon',obs,-1,date,1))};
  }catch(e){return{rise:'—',set:'—'};}
}

const PLANETS=[
  {name:'Sun',glyph:'☉',body:'Sun',color:'#f5c842',emoji:'🌞',au:0},
  {name:'Moon',glyph:'☽',body:'Moon',color:'#e8daf5',emoji:'🌙',au:.00257},
  {name:'Mercury',glyph:'☿',body:'Mercury',color:'#a8c4e0',emoji:'⚡',au:.387},
  {name:'Venus',glyph:'♀',body:'Venus',color:'#f5c084',emoji:'💛',au:.723},
  {name:'Mars',glyph:'♂',body:'Mars',color:'#e06060',emoji:'🔴',au:1.524},
  {name:'Jupiter',glyph:'♃',body:'Jupiter',color:'#f0a840',emoji:'🟠',au:5.203},
  {name:'Saturn',glyph:'♄',body:'Saturn',color:'#c8b870',emoji:'🪐',au:9.537},
  {name:'Uranus',glyph:'⛢',body:'Uranus',color:'#80e0e0',emoji:'🔵',au:19.19},
  {name:'Neptune',glyph:'♆',body:'Neptune',color:'#6080e8',emoji:'🔮',au:30.07},
  {name:'Pluto',glyph:'♇',body:'Pluto',color:'#8080a0',emoji:'⚫',au:39.48},
];

function computeSigns(date){
  const s={};
  for(const p of PLANETS){
    let lon = p.body==='Sun' ? getSunLon(date)
            : p.body==='Moon' ? getMoonLon(date)
            : getPlanetLon(p.body,date);
    // Use estimate for outer planets if Astronomy not ready
    if(lon===null){
      lon = estimateSunLon(date) + (p.au * 30); // rough placeholder
    }
    s[p.name]=lonToSign(lon);
    s[p.name].retro=isRetro(p.body,date.getTime());
  }
  return s;
}

const DAY_RULERS=['Sun','Moon','Mars','Mercury','Jupiter','Venus','Saturn'];
const DAY_GLYPHS={Sun:'☉',Moon:'☽',Mars:'♂',Mercury:'☿',Jupiter:'♃',Venus:'♀',Saturn:'♄'};

function renderHUD(signs,moon){
  const el=document.getElementById('hud');if(!el)return;
  const sun=signs?.Sun,ruler=DAY_RULERS[new Date().getDay()],
        retros=signs?Object.values(signs).filter(s=>s.retro).length:0,now=new Date();
  el.innerHTML=`
    <div class="hud-item"><div class="hud-label">SUN</div><div class="hud-val sun-val">${sun?sun.glyph+' '+sun.name:'♈ Aries'}</div></div>
    <div class="hud-item"><div class="hud-label">MOON</div><div class="hud-val">${moon?moon.icon+' '+moon.illum+'%':'🌙'}</div></div>
    <div class="hud-item"><div class="hud-label">RULER</div><div class="hud-val">${DAY_GLYPHS[ruler]} ${ruler}</div></div>
    <div class="hud-item"><div class="hud-label">℞</div><div class="hud-val retro-val">${retros>0?'● '+retros:'● 0'}</div></div>
    <div class="hud-item"><div class="hud-label">TODAY</div><div class="hud-val">${now.toLocaleDateString([],{month:'short',day:'numeric'})}</div></div>
    <div class="hud-item"><div class="hud-label">UPDATED</div><div class="hud-val">${now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div>`;
}

function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';document.body.appendChild(t);}
  t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);
}
function copyText(text){
  navigator.clipboard.writeText(text).then(()=>showToast('✦ Copied!')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('✦ Copied!');
  });
}

function injectNav(active){

  el.innerHTML=`<nav id="nav">${NAV_ITEMS.map(n=>`<a class="nav-btn${n.page===active?' active':''}" href="${n.href}"><span class="ni">${n.icon}</span>${n.label}</a>`).join('')}</nav>`;
}
function openModal(html){
  let ov=document.getElementById('modal-overlay');
  if(!ov){ov=document.createElement('div');ov.id='modal-overlay';ov.innerHTML='<div id="modal-box"></div>';document.body.appendChild(ov);
    ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});}
  document.getElementById('modal-box').innerHTML=html;
  ov.classList.add('open');
}
function closeModal(){const ov=document.getElementById('modal-overlay');if(ov)ov.classList.remove('open');}

// Wait for Astronomy library to load before computing
function waitForAstronomy(cb, tries=0) {
  if(typeof Astronomy !== 'undefined') { cb(); return; }
  if(tries > 20) { cb(); return; } // give up after 2s, use estimates
  setTimeout(() => waitForAstronomy(cb, tries+1), 100);
}

window.addEventListener('load',()=>{
  initStarfield();
  injectNav(document.body.dataset.page);
});

let hemisphere = 'north';

function setHemisphere(h, btn) {
  hemisphere = h;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSabbats();
}

function renderSabbats() {
  const list = hemisphere === 'north' ? SABBATS_NORTH : SABBATS_SOUTH;
  const now = new Date();
  const yr = now.getFullYear();

  // find next sabbat
  let nextIdx = -1, minDiff = Infinity;
  list.forEach((s, i) => {
    let dt = new Date(yr, s.mo, s.d);
    if (dt < now) dt = new Date(yr + 1, s.mo, s.d);
    const diff = dt - now;
    if (diff > 0 && diff < minDiff) { minDiff = diff; nextIdx = i; }
  });

  document.getElementById('sabbat-list').innerHTML = list.map((s, i) => {
    let dt = new Date(yr, s.mo, s.d);
    if (dt < now) dt = new Date(yr + 1, s.mo, s.d);
    const days = Math.ceil((dt - now) / 86400000);
    const isPast = dt < now;
    const isNext = i === nextIdx;
    return `<div class="sabbat-card" style="background:${s.gradient};opacity:${isPast ? '.75' : '1'}" onclick="showSabbat(${i})">
      ${isNext ? '<div class="sabbat-next-badge">✦ NEXT</div>' : ''}
      <div class="sabbat-top">
        <div class="sabbat-emoji">${s.emoji}</div>
        <div>
          <div class="sabbat-name">${s.name}</div>
          <div class="sabbat-date">📅 ${s.date} · ${s.season}</div>
        </div>
      </div>
      <div class="sabbat-theme">${s.theme.substring(0, 120)}…</div>
      <div class="sabbat-countdown" style="color:${isNext ? 'var(--gold)' : 'rgba(255,255,255,.5)'}">
        ${isNext ? '⭐ ' : ''}${days} days away
      </div>
    </div>`;
  }).join('');
}

function showSabbat(idx) {
  const list = hemisphere === 'north' ? SABBATS_NORTH : SABBATS_SOUTH;
  const s = list[idx];
  const now = new Date();
  let dt = new Date(now.getFullYear(), s.mo, s.d);
  if (dt < now) dt = new Date(now.getFullYear() + 1, s.mo, s.d);
  const days = Math.ceil((dt - now) / 86400000);

  openModal(`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div style="font-size:40px;margin-bottom:6px">${s.emoji}</div>
    <div class="modal-title">${s.name}</div>
    <div class="modal-sub">${s.date} · ${s.season} · ${days} days away</div>
    <div style="font-size:15px;color:var(--moon);line-height:1.7;margin-bottom:14px">${s.theme}</div>
    ${s.note ? `<div style="font-size:12px;color:var(--teal);margin-bottom:10px">🌏 ${s.note}</div>` : ''}

    <div class="modal-section"><h4>🌿 Sacred Herbs</h4><div class="tag-row">${(s.herbs||[]).map(h=>`<span class="tag">🌿 ${h}</span>`).join('')}</div></div>

    <div class="modal-section"><h4>🎨 Colors</h4><div class="tag-row">${(s.colors||[]).map(c=>`<span class="tag">${c}</span>`).join('')}</div></div>
    <div class="modal-section"><h4>🌙 Deities</h4><div class="tag-row">${(s.deities||[]).map(d=>`<span class="tag">⭐ ${d}</span>`).join('')}</div></div>

  `);
}

function init() {
  const cache = loadCache(); let signs, moon;
  if (!cacheStale(cache)) { signs = cache.d.signs; moon = cache.d.moon; }
